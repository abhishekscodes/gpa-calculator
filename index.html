<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/site.webmanifest">
    <!-- Link to Google Fonts for Roboto Slab -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap">
    <!-- Stylesheet link -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>GPA Calculator for SIT</h1>
        <h2>Only for CSE Students</h2>
        
        <!-- Batch Selection -->
        <div class="batch-selection" style="margin: 20px 0; text-align: center;">
            <label for="batchYear" style="font-weight: bold; margin-right: 10px; font-size: 18px; color: #d32f2f;">* Select Your Batch:</label>
            <select id="batchYear" style="padding: 10px; font-size: 16px; border-radius: 5px; border: 2px solid #4CAF50;" required>
                <option value="">-- Select Batch --</option>
                <option value="junior">1st Year Students(2025-29)</option>
                <option value="senior">2nd & 3rd Year Students</option>
            </select>
        </div>
        
        <div class="buttons">
            <button id="sem1" disabled>Sem 1</button>
            <button id="sem2" disabled>Sem 2</button>
            <button id="sem3" disabled>Sem 3</button>
            <button id="sem4" disabled>Sem 4</button>
			<button id="sem5" disabled>Sem 5</button>
        </div>
        <form id="gradeForm" class="hidden">
            <div id="subjectsContainer"></div>
            <button type="button" id="calculateGPA" class="hidden">Calculate GPA</button>
        </form>
        <button type="button" id="calculateCGPA" class="hidden">Calculate CGPA</button>
        <div id="cgpaInputs" class="hidden">
            <input type="number" id="gpa1" placeholder="Enter GPA 1" min="0" max="10">
            <input type="number" id="gpa2" placeholder="Enter GPA 2" min="0" max="10">
            <input type="number" id="gpa3" placeholder="Enter GPA 3" min="0" max="10">
            <input type="number" id="gpa4" placeholder="Enter GPA 4" min="0" max="10">
			<input type="number" id="gpa5" placeholder="Enter GPA 5" min="0" max="10">
            <div style="margin-top: 20px;">
            <button type="button" id="submitCGPA">Submit</button>
        </div>
        </div>
        <div id="gpaResult" class="hidden"></div>
        <div id="cgpaResult" class="hidden"></div>
    </div>

    <!-- About Us Button -->
    <div style="text-align: center; margin-top: 20px;">
    <button onclick="window.location.href='about.html';" class="about-us-button">
        About Us
    </button>

    <button onclick="window.open('https://github.com/Lynchy21/gpa-calculator', '_blank');" 
            class="github-button">
        View on GitHub
    </button>

	<button onclick="window.open('https://grademate-eta.vercel.app/', '_blank');" 
                    class="new-grademate-button" 
                    style="padding: 8px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                ✨ Try New Grademate
	</button>
</div>
    
    <footer>
        Made with 💙 by Abhishek Kumaran A J (CSE - A)- 2025 ©
    </footer>

    <script src="script.js"></script>
</body>
</html>
