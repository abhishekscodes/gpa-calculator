<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/site.webmanifest">
    <!-- Link to Google Fonts for Roboto Slab -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap">
    <!-- Stylesheet link -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>GPA Calculator for SIT</h1>
        <h2>CSE '23-27</h2>
        <div class="buttons">
            <button id="sem1">Sem 1</button>
            <button id="sem2">Sem 2</button>
            <button id="sem3">Sem 3</button>
            <button id="sem4">Sem 4</button>
			<button id="sem5">Sem 5</button>
        </div>
        <form id="gradeForm" class="hidden">
            <div id="subjectsContainer"></div>
            <button type="button" id="calculateGPA" class="hidden">Calculate GPA</button>
        </form>
        <button type="button" id="calculateCGPA" class="hidden">Calculate CGPA</button>
        <div id="cgpaInputs" class="hidden">
            <input type="number" id="gpa1" placeholder="Enter GPA 1" min="0" max="10">
            <input type="number" id="gpa2" placeholder="Enter GPA 2" min="0" max="10">
            <input type="number" id="gpa3" placeholder="Enter GPA 3" min="0" max="10">
            <input type="number" id="gpa4" placeholder="Enter GPA 4" min="0" max="10">
			<input type="number" id="gpa5" placeholder="Enter GPA 5" min="0" max="10">
            <div style="margin-top: 20px;">
            <button type="button" id="submitCGPA">Submit</button>
        </div>
        </div>
        <div id="gpaResult" class="hidden"></div>
        <div id="cgpaResult" class="hidden"></div>
    </div>

    <!-- About Us Button -->
    <div style="text-align: center; margin-top: 20px;">
    <button onclick="window.location.href='about.html';" class="about-us-button">
        About Us
    </button>

    <button onclick="window.open('https://github.com/YOUR_USERNAME/YOUR_REPO', '_blank');" 
            class="github-button">
        View on GitHub
    </button>
</div>
    
    <footer>
        Made with 💙 by Abhishek Kumaran A J (CSE - A)- 2025 ©
    </footer>


        <div id="updateModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="updateModalTitle">
			<div class="modal">
				<button class="modal-close" aria-label="Close update notice">×</button>
				<h3 id="updateModalTitle">A new Grademate is here!</h3>
				<p>Check out the updated experience with improved features and a refreshed design.</p>
				<a class="modal-cta" href="https://grademate-eta.vercel.app/" target="_blank" rel="noopener noreferrer">Go to new Grademate</a>
			</div>
		</div>
    <script src="script.js"></script>
</body>
</html>
